name: Fork Sync

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 UTC 00:00，同步一次
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync_with_upstream:
    name: Sync fork with upstream
    runs-on: ubuntu-latest

    # 仅在 fork 仓库中执行
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Sync upstream main into fork main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          echo "Adding upstream remote..."
          git remote add upstream https://github.com/huangxd-/danmu_api.git
          git fetch upstream main
          
          echo "Merging upstream/main..."
          git merge upstream/main --no-edit || {
            echo "Merge conflict detected! Resolving by accepting upstream changes..."
            git checkout --theirs .
            git add .
          }
          
          echo "Restoring local .github/workflows to prevent override..."
          git checkout origin/main -- .github/workflows || true
          
          echo "Committing and pushing changes..."
          git add -A
          # 仅当有未提交的变更时才执行 commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(sync): 同步 upstream 并保留本地 workflows"
          fi
          
          git push origin main
